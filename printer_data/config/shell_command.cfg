[gcode_shell_command hello_world]
command: echo hello world
timeout: 2.
verbose: True
[gcode_macro HELLO_WORLD]
gcode:
    RUN_SHELL_COMMAND CMD=hello_world

[gcode_shell_command _sh_klipper_log]
command: tail -n 100 /home/nik/printer_data/logs/klippy.log
timeout: 5
verbose: True

[gcode_shell_command _sh_disk_space]
command: df -h /home/nik/printer_data
timeout: 5
verbose: True

[gcode_shell_command _sh_moonraker_log]
command: tail -n 100 /home/nik/printer_data/logs/moonraker.log
timeout: 5
verbose: True

[gcode_macro GET_KLIPPER_LOG]
description: Print last 100 lines of klippy.log to console
gcode:
    RUN_SHELL_COMMAND CMD=_sh_klipper_log

[gcode_macro GET_MOONRAKER_LOG]
description: Print last 100 lines of moonraker.log to console
gcode:
    RUN_SHELL_COMMAND CMD=_sh_moonraker_log

[gcode_macro CHECK_DISK_SPACE]
description: Show free disk space on printer_data partition
gcode:
    RUN_SHELL_COMMAND CMD=_sh_disk_space
