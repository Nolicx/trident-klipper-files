####################
# Physical Hardware #
####################

[neopixel disco_leds]
pin: PD15
chain_count: 50
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
color_order: GRB

##########################
# LED Effects Animations #
##########################

# Heating states

[led_effect disco_heating_nozzle]
heater:                 extruder
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3  1  top  (1, 0.18, 0)                          # Orange breathing → nozzle heating
    static     0  0  top  (0.25, 0.06, 0.0)                    # Dim orange base when target reached

[led_effect disco_heating_bed]
heater:                 heater_bed
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3  1  top  (1, 0, 0)                             # Red breathing → bed heating
    static     0  0  top  (0.25, 0.0, 0.0)                     # Dim red base when target reached

[led_effect disco_heatsoaking]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  6  1  top  (1, 0.5, 0)                          # Slow amber breathing → warm/waiting

# Process states

[led_effect disco_cleaning]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3  1  top  (0.0, 0.02, 0.5)                     # Blue → cleaning

[led_effect disco_calibrating_z]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3  1  top  (0.0, 0.0, 0.35)                     # Blue → calibrating

[led_effect disco_homing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3  1  top  (0.0, 0.6, 0.2)                      # Green → homing

[led_effect disco_leveling]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3  1  top  (0.5, 0.1, 0.4)                      # Purple → leveling

[led_effect disco_meshing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3  1  top  (0.2, 1.0, 0.0)                      # Lime → meshing

[led_effect disco_printing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    gradient  0.3  1  add  (0.3, 0.0, 0.0),(0.3, 0.3, 0.0),(0.3, 0.1, 0.0)

#######################
# LED Effects Statics #
#######################

[led_effect disco_ready]
autostart:              true
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    twinkle 10.00 0.01 lighten (0.75,0.0,0.0),(0.0,0.75,0.0),(0.0,0.0,0.75)
    static  0.00  0.00 top     (0.25,0.25,0.25)

[led_effect disco_critical_error]
autostart:              false
frame_rate:             24
run_on_error:           true
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    strobe    1  1.5   add        (1.0,  1.0, 1.0)
    breathing 2  0     difference (0.95, 0.0, 0.0)
    static    1  0     top        (1.0,  0.0, 0.0)