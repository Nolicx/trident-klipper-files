####################
# Physical Hardware #
####################

[neopixel disco_leds]
pin: PD15
chain_count: 50
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
color_order: GRB

##########################
# LED Effects Animations #
##########################

# General printer state

[led_effect disco_printing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    gradient  0.3  1 add (0.3, 0.0, 0.0),(0.3, 0.3, 0.0),(0.3, 0.1, 0.0)  # Gleich wie sb_logo_printing

[led_effect disco_standby]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0.01, 0.01, 0.01)                                  # Gleich wie sb_logo_standby

[led_effect disco_busy]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (1, 0, 0)                                            # Gleich wie sb_logo_busy / sb_nozzle_busy

# Heating states

[led_effect disco_heating_nozzle]
heater:                 extruder
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (1, 0.18, 0)                                         # Gleich wie sb_logo_heating_nozzle
    static     0.00 0.00 top (0.25, 0.25, 0.25)

[led_effect disco_heating_bed]
heater:                 heater_bed
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (1, 0, 0)                                            # Gleich wie sb_logo_heating_bed
    static     0.00 0.00 top (0.25, 0.25, 0.25)

[led_effect disco_cooling_nozzle]
heater:                 extruder
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0, 0, 1)                                            # Gleich wie sb_logo_cooling_nozzle
    static     0.00 0.00 top (0.1, 0.1, 0.1)

[led_effect disco_cooling_bed]
heater:                 heater_bed
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0, 0, 1)                                            # Gleich wie sb_logo_cooling_bed
    static     0.00 0.00 top (0.1, 0.1, 0.1)

# Process states

[led_effect disco_cleaning]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0.0, 0.02, 0.5)                                     # Gleich wie sb_logo_cleaning
    static     0.00 0.00 top (0.25, 0.25, 0.25)

[led_effect disco_calibrating_z]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0.0, 0.0, 0.35)                                     # Gleich wie sb_logo_calibrating_z
    static     0.00 0.00 top (0.25, 0.25, 0.25)

[led_effect disco_homing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0.0, 0.6, 0.2)                                      # Gleich wie sb_logo_homing
    static     0.00 0.00 top (0.25, 0.25, 0.25)

[led_effect disco_leveling]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0.5, 0.1, 0.4)                                      # Gleich wie sb_logo_leveling
    static     0.00 0.00 top (0.25, 0.25, 0.25)

[led_effect disco_meshing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    breathing  3 1 top (0.2, 1.0, 0.0)                                      # Gleich wie sb_logo_meshing
    static     0.00 0.00 top (0.25, 0.25, 0.25)

#######################
# LED Effects Statics #
#######################

[led_effect disco_ready]
autostart:              true
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    gradient  0.3  1 add (0.3, 0.0, 0.0),(0.0, 0.3, 0.0),(0.0, 0.0, 0.3)  # Gleich wie sb_ready
    static    0.00 0.00 top (0.25, 0.25, 0.25)

[led_effect disco_critical_error]
autostart:              false
frame_rate:             24
run_on_error:           true
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    strobe    1  1.5   add        (1.0,  1.0, 1.0)
    breathing 2  0     difference (0.95, 0.0, 0.0)
    static    1  0     top        (1.0,  0.0, 0.0)