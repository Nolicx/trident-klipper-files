[neopixel disco_leds]
#To control Neopixel RGB in mini12864 display
pin: PD15
chain_count: 50
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
color_order: GRB

##########################
# LED Effects Animations #
##########################

# General printer state

[led_effect disco_printing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds
layers:
        # gradient  0.3  1 add (0.3, 0.0, 0.0),(0.3, 0.3, 0.0),(0.3, 0.1, 0.0)
        static  0.00 0.00 top (0.5,0.5,0.5) 

[led_effect disco_standby]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds
layers:
        breathing  3 1 top (0.01, 0.01, 0.01)

[led_effect disco_part_ready]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds
layers:
        breathing  3 1 top (0.0, 1.0, 0.0)

[led_effect disco_busy]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds
layers:
    breathing  3 1 top (1,0,0)

# Heating states

[led_effect disco_heating_nozzle]
heater:extruder
leds:
    neopixel:disco_leds 
autostart:                          false
frame_rate:                         24
layers:
    # # comet  0.3  0 add (1, 0.18, 0)
    # heaterfire 1.00 0 top (1,1,0),(1,0.18,0) 
        chase 0.5 5.0 lighten (1, 0.18, 0), (1, 0.18, 0)
        static  0.00 0.00 top (0.25,0.25,0.25) 

[led_effect disco_heating_bed]
leds:
    neopixel:disco_leds 
autostart:                          false
frame_rate:                         24
layers:
    # comet  0.3  0 add (1, 0.18, 0)
        chase 0.5 5.0 lighten (1, 0.18, 0), (1, 0.18, 0)
        static  0.00 0.00 top (0.25,0.25,0.25) 

[led_effect disco_cooling_nozzle]
leds:
    neopixel:disco_leds
autostart:                          false
frame_rate:                         24
layers:
    comet  0.3  0 add (0, 0, 1)

[led_effect disco_cooling_bed]
leds:
    neopixel:disco_leds
autostart:                          false
frame_rate:                         24
layers:
    comet  0.3  0 add (0, 0, 1)

# Process states

[led_effect disco_cleaning]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
    # breathing  3 1 top (0.0, 0.02, 0.5)
        chase 0.5 5.0 lighten (0.0, 0.02, 0.5), (0.0, 0.02, 0.5)
        static  0.00 0.00 top (0.25,0.25,0.25) 

[led_effect disco_calibrating_z]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
        # breathing  3 1 top (0.0, 0.0, 0.35)
        chase 0.5 5.0 lighten (0.0, 0.0, 0.35), (0.0, 0.0, 0.35)
        static  0.00 0.00 top (0.25,0.25,0.25) 

[led_effect disco_homing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
        # breathing  3 1 top (0.0, 0.6, 0.2)
        chase 0.5 5.0 lighten (0.0, 0.6, 0.2), (0.0, 0.6, 0.2) 
        static  0.00 0.00 top (0.25,0.25,0.25) 

[led_effect disco_leveling]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
        # breathing  3 1 top (0.5, 0.1, 0.4)
        chase 0.5 5.0 lighten (0.5, 0.1, 0.4), (0.5, 0.1, 0.4) 
        static  0.00 0.00 top (0.25,0.25,0.25) 

[led_effect disco_meshing]
autostart:              false
frame_rate:             24
leds:
    neopixel:disco_leds (1-25)
    neopixel:disco_leds (50-26)
layers:
        # breathing  3 1 top (0.2, 1.0, 0.0)
        chase 0.5 5.0 lighten (0.2, 1.0, 0.0), (0.2, 1.0, 0.0)
        static  0.00 0.00 top (0.25,0.25,0.25) 


#######################
# LED Effects Statics #
#######################

[led_effect disco_ready]
autostart:              true
frame_rate:             24
leds:
    neopixel:disco_leds
layers:
    # static  0 0 top (0.5,0.5,0.5)
    # gradient  0.2 2.00 lighten (0.75,0.0,0.0),(0.0,0.75,0.0),(0.0,0.0,0.75) 
    twinkle 10.00 0.01 lighten (0.75,0.0,0.0),(0.0,0.75,0.0),(0.0,0.0,0.75) 
    static  0.00 0.00 top (0.25,0.25,0.25) 

[led_effect disco_critical_error]
leds:
    neopixel:disco_leds
layers:
    strobe         1  1.5   add        (1.0,  1.0, 1.0)
    breathing      2  0     difference (0.95, 0.0, 0.0)
    static         1  0     top        (1.0,  0.0, 0.0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true

