[neopixel sb_leds]
pin: EBBCan:gpio16
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

############################
## LED Effects Animations ##
############################

################
# logo effects #
################

[led_effect sb_logo_cleaning]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (0.0, 0.02, 0.5),(0.0, 0.3, 0.6)   # Blue → Cyan

[led_effect sb_logo_calibrating_z]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (0.0, 0.0, 0.35),(0.0, 0.1, 0.6)   # Dark blue → Blue

[led_effect sb_logo_heating_nozzle]
heater:                 extruder
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (1.0, 0.18, 0.0),(1.0, 0.6, 0.0)   # Orange → Yellow-orange

[led_effect sb_logo_heating_bed]
heater:                 heater_bed
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (1.0, 0.0, 0.0),(1.0, 0.15, 0.0)   # Red → Orange-red

[led_effect sb_logo_heatsoaking]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (1.0, 0.5, 0.0),(0.8, 0.2, 0.0)    # Amber → Orange

[led_effect sb_logo_homing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (0.0, 0.6, 0.2),(0.0, 0.4, 0.5)    # Green → Teal

[led_effect sb_logo_leveling]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (0.5, 0.1, 0.4),(0.7, 0.0, 0.5)    # Purple → Magenta

[led_effect sb_logo_meshing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient  0.5  1  add  (0.2, 1.0, 0.0),(0.0, 0.6, 0.3)    # Lime → Green

[led_effect sb_logo_printing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    static  0  0  top  (0.1, 0.05, 0.0, 1.0)                   # Warm white → printing

##################
# nozzle effects #
##################

[led_effect sb_nozzle_heating_nozzle]
heater:                 extruder
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (1, 0.18, 0, 0)               # Orange twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

[led_effect sb_nozzle_heating_bed]
heater:                 heater_bed
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (1, 0, 0, 0)                  # Red twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

[led_effect sb_nozzle_heatsoaking]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (1, 0.5, 0, 0)                # Amber twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

[led_effect sb_nozzle_homing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (0.0, 0.6, 0.2, 0.0)          # Green twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

[led_effect sb_nozzle_cleaning]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (0.0, 0.02, 0.5, 0.0)         # Blue twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

[led_effect sb_nozzle_calibrating_z]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (0.0, 0.0, 0.35, 0.0)         # Dark blue twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

[led_effect sb_nozzle_leveling]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (0.5, 0.1, 0.4, 0.0)          # Purple twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

[led_effect sb_nozzle_meshing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    twinkle    5  0.05  lighten  (0.2, 1.0, 0.0, 0.0)          # Lime twinkle
    static     0  0     top      (0.0, 0.0, 0.0, 0.2)          # Dim white base

###################
# all led effects #
###################

[led_effect sb_critical_error]
autostart:              false
frame_rate:             24
run_on_error:           true
leds:
    neopixel:sb_leds
layers:
    strobe    1  1.5   add        (1.0,  1.0, 1.0)
    breathing 2  0     difference (0.95, 0.0, 0.0)
    static    1  0     top        (1.0,  0.0, 0.0)

[led_effect sb_ready]
autostart:              true
frame_rate:             24
leds:
    neopixel:sb_leds
layers:
    gradient  0.3  1  add  (0.3, 0.0, 0.0),(0.0, 0.3, 0.0),(0.0, 0.0, 0.3)

#######################
# LED Effects Statics #
#######################

[led_effect set_nozzle_leds]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    static  0  0  top  (0.0, 0.0, 0.0, 1.0)

[led_effect set_logo_leds]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    static  0  0  top  (1.0, 1.0, 1.0)
