[include disco_on_a_stick.cfg]

[neopixel sb_leds]
pin: EBBCan:gpio16
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

############################
## LED Effects Animations ##
############################

################
# logo effects #
################

[led_effect sb_logo_cleaning]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    chase      0.5  1  top  (0.0, 0.02, 0.5)                   # Chase blue → movement/cleaning

[led_effect sb_logo_calibrating_z]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    breathing  3  1  top  (0.0, 0.0, 0.35)                     # Breathing blue → slow calibration

[led_effect sb_logo_heating_nozzle]
heater:                 extruder
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    heaterfire 1  0  top  (1, 0.18, 0),(1, 1, 0)               # Fire while heating
    breathing  3  1  top  (1, 0.18, 0)                          # Orange breathing when target reached

[led_effect sb_logo_heating_bed]
heater:                 heater_bed
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    heater     20  1  top  (1, 1, 0),(1, 0, 0)                 # Yellow→Red progress while heating
    breathing  3  1  top  (1, 0, 0)                             # Red breathing when target reached

[led_effect sb_logo_heatsoaking]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    breathing  6  1  top  (1, 0.5, 0)                          # Slow amber breathing → warm/waiting

[led_effect sb_logo_homing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    chase      0.5  1  top  (0.0, 0.6, 0.2)                    # Chase green → movement/homing

[led_effect sb_logo_leveling]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    breathing  3  1  top  (0.5, 0.1, 0.4)                      # Breathing purple → slow leveling

[led_effect sb_logo_meshing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    chase      0.5  1  top  (0.2, 1.0, 0.0)                    # Chase lime → movement/scanning

[led_effect sb_logo_printing]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    gradient   0.3  1  add  (0.3, 0.0, 0.0),(0.3, 0.3, 0.0),(0.3, 0.1, 0.0)

##################
# nozzle effects #
##################

[led_effect sb_nozzle_heating_nozzle]
heater:                 extruder
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    heaterfire 1  0  top  (1, 0.18, 0, 0),(1, 1, 0, 0)         # Fire while heating
    breathing  3  1  top  (1, 0.18, 0, 0)                       # Orange breathing when target reached

[led_effect sb_nozzle_heating_bed]
heater:                 heater_bed
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    heater     20  1  top  (1, 1, 0, 0),(1, 0, 0, 0)           # Yellow→Red progress while heating
    breathing  3  1  top  (1, 0, 0, 0)                          # Red breathing when target reached

[led_effect sb_nozzle_heatsoaking]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    breathing  6  1  top  (1, 0.5, 0, 0)                       # Slow amber breathing → warm/waiting

###################
# all led effects #
###################

[led_effect sb_critical_error]
autostart:              false
frame_rate:             24
run_on_error:           true
leds:
    neopixel:sb_leds
layers:
    strobe    1  1.5   add        (1.0,  1.0, 1.0)
    breathing 2  0     difference (0.95, 0.0, 0.0)
    static    1  0     top        (1.0,  0.0, 0.0)

[led_effect sb_ready]
autostart:              true
frame_rate:             24
leds:
    neopixel:sb_leds
layers:
    gradient  0.3  1  add  (0.3, 0.0, 0.0),(0.0, 0.3, 0.0),(0.0, 0.0, 0.3)

#######################
# LED Effects Statics #
#######################

[led_effect set_nozzle_leds]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (2,3)
layers:
    static  0  0  top  (0.0, 0.0, 0.0, 1.0)

[led_effect set_logo_leds]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds (1)
layers:
    static  0  0  top  (1.0, 1.0, 1.0)