[gcode_macro PRINT_END]
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% set act_z = printer.toolhead.position.z|float %}

    M400                                                        # Wait for buffer to clear
    G92 E0                                                      # Zero the extruder
    G1 E-10.0 F3600                                             # Retract filament
    G92 E0

    ##################################################################
    # Safe Z raise before moving to brush
    ##################################################################
    {% set z_raise = [act_z + v.end_z_raise, max_z]|min %}
    G90
    G0 Z{z_raise} F{v.travel_z * 60}

    PARK

    TURN_OFF_HEATERS
    M107
    BED_MESH_CLEAR

    ##################################################################
    # Lower bed to presentation position
    # Move Z to 200mm so the print is accessible — skip if already there
    ##################################################################
    {% if printer.toolhead.position.z < v.end_z_present %}
        G0 Z{v.end_z_present} F{v.travel_z * 60}
    {% endif %}

    ##################################################################
    # Clean nozzle (navigates to brush via PARK internally)
    ##################################################################
    CLEAN_NOZZLE

    M84

    SET_DISPLAY_TEXT MSG="Print Complete"
    CASE_LIGHT_OFF
    SET_FAN_SPEED FAN=nevermore SPEED=0
    STATUS_READY
