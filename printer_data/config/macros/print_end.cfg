[include lighting_control.cfg]
[include clean_nozzle.cfg]

[gcode_macro PRINT_END]
gcode:
    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    {% set X_CENTER = printer.toolhead.axis_maximum.x / 2 %}
    {% set Y_PARK = printer.toolhead.axis_maximum.y - 10 %}

    M400                                            # Wait for buffer to clear
    G92 E0                                          # Zero the extruder
    G1 E-10.0 F3600                                 # Retract filament
    G92 E0

    G91                                             # Relative positioning
    G0 Z5.00 X20.0 Y20.0 F20000                    # Move nozzle to remove stringing
    G90                                             # Absolute positioning
    G0 X{X_CENTER} Y{Y_PARK} F3600                 # Park nozzle at rear center

    TURN_OFF_HEATERS
    M107                                            # Turn off part cooling fan
    BED_MESH_CLEAR
    M84                                             # Motors off

    SET_DISPLAY_TEXT MSG="Finished Printing"

    CASE_LIGHT_OFF
    SET_FAN_SPEED FAN=nevermore SPEED=0
    STATUS_PART_READY                               # Regenbogen + Nozzle weiß = Teil fertig

    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0