[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    BASE_PAUSE
    SAVE_GCODE_STATE NAME=pause_state
    M107
    PARK

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    RESTORE_GCODE_STATE NAME=pause_state MOVE=1 MOVE_SPEED={v.travel_xy}
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}
        PRINT_END
    {% else %}
        TURN_OFF_HEATERS
        M107
        BED_MESH_CLEAR
        M84
        STATUS_READY
    {% endif %}
    BASE_CANCEL_PRINT

[gcode_macro M600]
gcode:
    PAUSE
    SET_DISPLAY_TEXT MSG="Filament Change — Resume when ready"
