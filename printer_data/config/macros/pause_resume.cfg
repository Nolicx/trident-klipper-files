[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
variable_part_cooling_speed: 0
variable_auxiliary_speed: 0
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=part_cooling_speed VALUE={printer["fan_generic part_cooling"].speed}
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=auxiliary_speed VALUE={printer["fan_generic auxiliary"].speed}
    BASE_PAUSE
    SAVE_GCODE_STATE NAME=pause_state
    M107
    PARK

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set pause = printer["gcode_macro PAUSE"] %}
    CLEAN_NOZZLE RETURN=0
    RESTORE_GCODE_STATE NAME=pause_state MOVE=1 MOVE_SPEED={v.travel_xy}
    SET_FAN_SPEED FAN=part_cooling SPEED={pause.part_cooling_speed}
    SET_FAN_SPEED FAN=auxiliary SPEED={pause.auxiliary_speed}
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}
        PRINT_END
    {% else %}
        TURN_OFF_HEATERS
        M107
        BED_MESH_CLEAR
        M84
        STATUS_READY
    {% endif %}
    BASE_CANCEL_PRINT

[gcode_macro M600]
gcode:
    PAUSE
    SET_DISPLAY_TEXT MSG="Filament Change — Resume when ready"
