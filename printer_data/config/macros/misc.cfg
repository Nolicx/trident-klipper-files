# macros/misc.cfg

##################################################################
# M109 / M190 overrides
# Use TEMPERATURE_WAIT with ±1°C window instead of blocking indefinitely,
# allowing Klipper to process other commands while waiting.
##################################################################

[gcode_macro M109]
rename_existing: M99109
description: Wait for nozzle temperature (non-blocking, ±1°C window)
gcode:
    {% set s = params.S|float %}
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
description: Wait for bed temperature (non-blocking, ±1°C window)
gcode:
    {% set s = params.S|float %}
    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}
    {% endif %}

