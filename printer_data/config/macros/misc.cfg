##################################################################
# Conditional homing helpers
##################################################################

[gcode_macro CG28]
description: Home all axes only if not already homed
gcode:
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes or "z" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

[gcode_macro CG28XY]
description: Home X and Y only if not already homed
gcode:
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}

[gcode_macro CG28Z]
description: Home Z only if not already homed
gcode:
    {% if "z" not in printer.toolhead.homed_axes %}
        G28 Z
    {% endif %}

##################################################################
# Utilities
##################################################################

[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: BASE_SET_PRINT_STATS_INFO
description: Update display with current layer number during printing
gcode:
    BASE_SET_PRINT_STATS_INFO { rawparams }
    {% if params.CURRENT_LAYER is defined %}
        SET_DISPLAY_TEXT MSG="Layer {params.CURRENT_LAYER} / {printer.print_stats.info.total_layer|default('?')}"
    {% endif %}

[gcode_macro DUMP_VARIABLES]
description: Print all printer variables to console. Optional: NAME= to filter by keyword.
gcode:
    {% set filter = params.NAME|default('')|lower %}
    {% set out = [] %}
    {% for key1 in printer %}
        {% for key2 in printer[key1] %}
            {% if filter in key1|lower or filter in key2|lower %}
                {% set dummy = out.append("printer.%s.%s = %s" % (key1, key2, printer[key1][key2])) %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    {action_respond_info(out|join("\n"))}
