################
## LED Macros ##
################

# Control SB LEDs
[gcode_macro set_logo_leds_off]
gcode:
    SET_LED_EFFECT EFFECT=set_logo_leds STOP=1

[gcode_macro set_logo_leds_on]
gcode:
    SET_LED_EFFECT EFFECT=set_logo_leds

[gcode_macro set_nozzle_leds_on]
gcode:
    SET_LED_EFFECT EFFECT=set_nozzle_leds

[gcode_macro set_nozzle_leds_off]
gcode:
    SET_LED_EFFECT EFFECT=set_nozzle_leds STOP=1

# General printer state
[gcode_macro status_off]
gcode:
    STOP_LED_EFFECTS

[gcode_macro status_busy]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_busy
    SET_LED_EFFECT EFFECT=sb_nozzle_busy
    SET_LED_EFFECT EFFECT=disco_busy

[gcode_macro status_ready]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_ready
    SET_LED_EFFECT EFFECT=disco_ready

[gcode_macro status_part_ready]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_ready                                          # Regenbogen Logo
    SET_LED_EFFECT EFFECT=disco_ready                                       # Regenbogen Disco
    SET_LED_EFFECT EFFECT=sb_nozzle_part_ready                              # Regenbogen Nozzle (neu)

[gcode_macro status_printing]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_printing
    SET_LED_EFFECT EFFECT=disco_printing
    set_nozzle_leds_on

# Heating states
[gcode_macro status_heating_nozzle]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_heating_nozzle
    SET_LED_EFFECT EFFECT=sb_nozzle_heating_nozzle
    SET_LED_EFFECT EFFECT=disco_heating_nozzle

[gcode_macro status_heating_bed]
gcode:
