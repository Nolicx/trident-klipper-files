# macros/park.cfg

[gcode_macro PARK]
description: Park toolhead safely at brush position. Homes if needed.
# Parameters:
#   Z_HOP=<mm> — amount to raise Z before moving (default: park_z_hop)
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set Z_HOP = params.Z_HOP|default(v.park_z_hop)|float %}
    {% set y_park = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    CG28

    # Raise Z by Z_HOP, capped at axis max
    {% if act_z < (max_z - Z_HOP) %}
        {% set z_safe = act_z + Z_HOP %}
    {% else %}
        {% set z_safe = max_z %}
    {% endif %}

    SET_VELOCITY_LIMIT ACCEL={v.accel_travel}
    G90

    G0 Z{z_safe} F{v.travel_z * 60}

    # Near rear of bed: approach via y_max-14 before moving X to avoid brush collision
    {% if printer.toolhead.position.y > v.safe_approach_y and printer.toolhead.position.x != v.park_x %}
        G0 Y{y_park - 14} F{v.travel_xy * 60}
        G0 X{v.park_x}
        G0 Y{y_park}
    {% elif printer.toolhead.position.x != v.park_x or printer.toolhead.position.y != y_park %}
        G0 X{v.park_x} Y{y_park - 14} F{v.travel_xy * 60}
        G0 Y{y_park}
    {% endif %}
