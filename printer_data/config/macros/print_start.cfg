[gcode_macro PRINT_START]
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set BED_TEMP = params.BED|int %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|int %}
    #{% set PROBE_TEMP = params.PROBE|default(v.probe_temp)|int + 15%}
    {% set PROBE_TEMP = v.probe_temp %}

    CASE_LIGHT_ON
    SET_DISPLAY_TEXT MSG="Starting Print"
    G90                                                         # Absolute positioning
    M83                                                         # Extruder relative mode

    ##################################################################
    # 1. Home and park
    ##################################################################
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing"
    CG28
    PARK

    ##################################################################
    # 2. Heat bed and heatsoak
    #    Printer is parked → safe to heat without moving
    ##################################################################
    STATUS_HEATING_BED
    SET_DISPLAY_TEXT MSG="Bed: {BED_TEMP}c"                                       
    {% if BED_TEMP > v.bed_temp_high %}
        SET_FAN_SPEED FAN=nevermore SPEED=1
        M190 S{BED_TEMP}
        STATUS_HEATSOAKING
        SET_DISPLAY_TEXT MSG="Heatsoak for 5 min"
        G4 P{v.heatsoak_long}
    {% else %}
        M190 S{BED_TEMP}
        STATUS_HEATSOAKING
        SET_DISPLAY_TEXT MSG="Heatsoak for 1 min"
        G4 P{v.heatsoak_short}
    {% endif %}

    ##################################################################
    # 3. Heat nozzle to probe temp
    #    150°C → safe for TAP probing, hot enough to wipe cleanly
    ##################################################################
    STATUS_HEATING_NOZZLE
    SET_DISPLAY_TEXT MSG="Hotend: {PROBE_TEMP}c"
    M109 S{PROBE_TEMP}

    ##################################################################
    # 4. Clean nozzle and home Z
    #    Clean first → no filament residue on bed during Z home
    ##################################################################
    STATUS_CLEANING
    SET_DISPLAY_TEXT MSG="Cleaning Nozzle"
    CLEAN_NOZZLE
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing Z"
    G28 Z

    ##################################################################
    # 5. Z Tilt
    #    Levels the gantry → always re-home Z afterwards
    ##################################################################
    STATUS_CALIBRATING_Z
    SET_DISPLAY_TEXT MSG="Z Tilt Calibration"
    Z_TILT_ADJUST
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing Z"
    G28 Z

    ##################################################################
    # 6. Clean before bed mesh
    #    Removes any ooze from Z Tilt moves → accurate mesh
    ##################################################################
    STATUS_CLEANING
    SET_DISPLAY_TEXT MSG="Cleaning Nozzle"
    CLEAN_NOZZLE

    ##################################################################
    # 7. Bed mesh calibration
    ##################################################################
    STATUS_MESHING
    SET_DISPLAY_TEXT MSG="Bed Mesh Calibration"
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1

    ##################################################################
    # 8. Heat nozzle to print temp
    #    Park while heating → no ooze on bed
    ##################################################################
    STATUS_HEATING_NOZZLE
    SET_DISPLAY_TEXT MSG="Hotend: {EXTRUDER_TEMP}c"
    M107                                                        # Part cooling off
    PARK
    M109 S{EXTRUDER_TEMP}

    ##################################################################
    # 9. Final clean and purge
    #    At print temp → clean wipe + LINE_PURGE primes nozzle
    ##################################################################
    STATUS_CLEANING
    SET_DISPLAY_TEXT MSG="Cleaning Nozzle"
    CLEAN_NOZZLE
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Purge Line"
    LINE_PURGE

    SET_DISPLAY_TEXT MSG="Printing"