# macros/print_start.cfg

[gcode_macro PRINT_START]
description: Full print start sequence — homes, heats, levels, meshes, purges
# Parameters:
#   BED=<°C>      — target bed temperature
#   EXTRUDER=<°C> — target extruder temperature
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set BED_TEMP = params.BED|int %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|int %}
    {% set PROBE_TEMP = v.probe_temp %}

    CASE_LIGHT_ON
    SET_DISPLAY_TEXT MSG="Preparing"
    G90                                                         # Absolute positioning
    M83                                                         # Extruder relative mode

    ##################################################################
    # 1. Home and park
    ##################################################################
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing All Axes"
    CG28
    PARK

    ##################################################################
    # 2. Heat bed and heatsoak
    #    Printer is parked → safe to heat without moving
    ##################################################################
    STATUS_HEATING_BED
    SET_DISPLAY_TEXT MSG="Heating Bed → {BED_TEMP}°C"
    {% if BED_TEMP > v.bed_temp_high %}
        SET_FAN_SPEED FAN=nevermore SPEED=1
        M190 S{BED_TEMP}
        STATUS_HEATSOAKING
        SET_DISPLAY_TEXT MSG="Heatsoaking Chamber"
        G4 P{v.heatsoak_long}
    {% else %}
        M190 S{BED_TEMP}
    {% endif %}

    ##################################################################
    # 3. Heat nozzle to probe temp
    #    150°C → safe for TAP probing, hot enough to wipe cleanly
    ##################################################################
    STATUS_HEATING_NOZZLE
    SET_DISPLAY_TEXT MSG="Heating Nozzle → {PROBE_TEMP}°C"
    M109 S{PROBE_TEMP}

    ##################################################################
    # 4. Clean nozzle and home Z
    #    Clean first → no filament residue on bed during Z home
    ##################################################################
    STATUS_CLEANING
    SET_DISPLAY_TEXT MSG="Cleaning Nozzle"
    CLEAN_NOZZLE
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing Z"
    G28 Z

    ##################################################################
    # 5. Z Tilt
    #    Levels the gantry → clean nozzle before re-homing Z
    ##################################################################
    STATUS_LEVELING
    SET_DISPLAY_TEXT MSG="Leveling Gantry"
    Z_TILT_ADJUST

    ##################################################################
    # 6. Clean before Z home and bed mesh
    #    Removes ooze from Z Tilt moves → accurate TAP probe
    ##################################################################
    STATUS_CLEANING
    SET_DISPLAY_TEXT MSG="Cleaning Nozzle"
    CLEAN_NOZZLE
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing Z"
    G28 Z

    ##################################################################
    # 7. Bed mesh calibration
    ##################################################################
    STATUS_MESHING
    SET_DISPLAY_TEXT MSG="Mapping Bed Mesh"
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1

    ##################################################################
    # 8. Heat nozzle to print temp
    #    Park while heating → no ooze on bed
    ##################################################################
    STATUS_HEATING_NOZZLE
    SET_DISPLAY_TEXT MSG="Heating Nozzle → {EXTRUDER_TEMP}°C"
    M107                                                        # Part cooling off
    PARK
    M109 S{EXTRUDER_TEMP}

    ##################################################################
    # 9. Final clean and purge
    #    At print temp → clean wipe + LINE_PURGE primes nozzle
    ##################################################################
    STATUS_CLEANING
    SET_DISPLAY_TEXT MSG="Cleaning Nozzle"
    CLEAN_NOZZLE
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Purging"
    LINE_PURGE

    SET_DISPLAY_TEXT MSG="Printing"
