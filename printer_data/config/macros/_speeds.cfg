[gcode_macro _SPEEDS]
description: Central speed configuration for all macros
variable_travel_xy:     400     # mm/s - XY travel speed
variable_travel_z:       20     # mm/s - Z travel speed
variable_wipe:          150     # mm/s - Nozzle wipe speed
variable_accel_travel:  9000    # mm/s² - Travel acceleration
variable_accel_wipe:    7000    # mm/s² - Wipe acceleration
variable_z_hop:          10     # mm   - Default Z hop height for PARK
gcode: