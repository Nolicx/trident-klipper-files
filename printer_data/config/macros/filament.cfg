[gcode_macro LOAD_FILAMENT]
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set temp = params.TEMP|default(v.purge_temp_min + 10)|int %}

    STATUS_HEATING_NOZZLE
    SET_DISPLAY_TEXT MSG="Heating Nozzle → {temp}°C"
    M109 S{temp}

    STATUS_CLEANING
    SET_DISPLAY_TEXT MSG="Loading Filament"
    M83
    G1 E{v.filament_load_len} F{v.purge_spd * 60}
    G1 E20 F{v.purge_spd * 30}                                     # Slow final push to prime
    G92 E0

    SET_DISPLAY_TEXT MSG="Load Complete"
    STATUS_READY

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set temp = params.TEMP|default(v.purge_temp_min + 10)|int %}

    STATUS_HEATING_NOZZLE
    SET_DISPLAY_TEXT MSG="Heating Nozzle → {temp}°C"
    M109 S{temp}

    SET_DISPLAY_TEXT MSG="Unloading Filament"
    M83
    G1 E5 F{v.purge_spd * 30}                                      # Small purge to clear nozzle
    G1 E-{v.filament_unload_len} F{v.purge_spd * 60 * 3}          # Fast retract
    G92 E0

    SET_DISPLAY_TEXT MSG="Unload Complete"
    STATUS_READY
