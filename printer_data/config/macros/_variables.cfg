##################################################################
# Central Printer Configuration
# All positions, speeds and dimensions in one place
##################################################################

[gcode_macro _VARIABLES]
description: Central configuration for all macros

## Printer dimensions (from printer.cfg)
variable_bed_x_max:         296     # position_max stepper_x
variable_bed_y_max:         300     # position_max stepper_y
variable_bed_z_max:         250     # position_max stepper_z

## Bed center (auto-calculated from above)
variable_bed_x_center:      148     # bed_x_max / 2
variable_bed_y_center:      150     # bed_y_max / 2

## Nozzle brush / park position (from clean_nozzle.cfg / park.cfg)
variable_brush_x_left:       42     # left_of_brush_x
variable_brush_x_right:      90     # right_of_brush_x / x_park
variable_brush_y:           300     # axis_maximum.y (dynamisch im Makro)
variable_park_x:             90     # x_park in PARK macro
variable_park_z_hop:         10     # Default Z hop when parking

## Filametrix screw safety Y threshold
variable_filametrix_y_min:   43     # Below this Y, move to safety Y first
variable_filametrix_y_safe:  60     # Safety Y position for Filametrix

## Safe approach Y threshold (near rear of printer)
variable_safe_approach_y:   293     # Above this Y, approach from y_max-14

## Temperatures
variable_probe_temp:        150     # Default nozzle temp for probing
variable_purge_temp_min:    190     # Minimum temp to allow purge
variable_heatsoak_long:  300000     # ms - Heatsoak for bed > 90c (5 min)
variable_heatsoak_short:  60000     # ms - Heatsoak for bed <= 90c (1 min)
variable_bed_temp_high:      90     # °C threshold for long heatsoak

## Travel speeds
variable_travel_xy:         400     # mm/s - XY travel
variable_travel_z:           20     # mm/s - Z travel
variable_accel_travel:     9000     # mm/s² - Travel acceleration

## Process speeds
variable_wipe_spd:          150     # mm/s - Nozzle wipe speed
variable_accel_wipe:       7000     # mm/s² - Wipe acceleration
variable_purge_spd:          11     # mm/s - Purge extrusion speed
variable_purge_ret:           5     # mm  - Retract after purge
variable_ooze_dwell:       2500     # ms  - Dwell after cooling

## Wipe settings
variable_wipe_qty:            5     # Number of full wipes

gcode:
    # This macro is intentionally empty - it only holds variables
     {action_respond_info(" Running this macro does nothing, it is only used for storing variable values. ")}