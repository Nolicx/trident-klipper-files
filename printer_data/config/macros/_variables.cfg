##################################################################
# Central Printer Configuration
# All positions, speeds and dimensions in one place
##################################################################

[gcode_macro _VARIABLES]
description: Central configuration for all macros

##################################################################
## Printer dimensions
## Must match position_max values in printer.cfg
##################################################################
variable_bed_x_max:         296     # position_max stepper_x → used in TEST_SPEED_FAST
variable_bed_y_max:         300     # position_max stepper_y → used in TEST_SPEED_FAST
variable_bed_z_max:         250     # position_max stepper_z → used in PARK (z safety)

##################################################################
## Bed center
## Used for parking during homing and heating
## = bed_x/y_max / 2
##################################################################
variable_bed_x_center:      148     # → safe_z_home, PRINT_END park position
variable_bed_y_center:      150     # → safe_z_home

##################################################################
## Brush and park position
## Physical position of the nozzle brush and park spot
## Measure these values from your actual printer
##################################################################
variable_brush_x_left:       42     # Left edge of brush → CLEAN_NOZZLE start position
variable_brush_x_right:      90     # Right edge of brush → CLEAN_NOZZLE end position
variable_brush_y:           300     # Y position of brush = axis_maximum.y (rear of bed)
variable_park_x:             90     # X position when parked → same as brush_x_right
variable_park_z_hop:         10     # mm to raise Z when parking → prevents crashes

##################################################################
## Rear approach safety
## Near the rear of the bed (high Y), the toolhead must approach
## the brush in a specific order to avoid collisions
##################################################################
variable_safe_approach_y:   293     # Above this Y → approach via y_max-14 before moving X

##################################################################
## Temperatures
##################################################################
variable_probe_temp:        150     # °C - Nozzle temp for Z probing (TAP safe temperature)
variable_purge_temp_min:    190     # °C - Minimum temp before purging is allowed
variable_bed_temp_high:      90     # °C - Above this bed temp → long heatsoak kicks in

##################################################################
## Heatsoak durations
## Longer soak for high-temp materials (ABS/ASA) to stabilize
## the chamber before printing
##################################################################
variable_heatsoak_long:  300000     # ms (5 min) - Used when bed temp > bed_temp_high
variable_heatsoak_short:  60000     # ms (1 min) - Used when bed temp <= bed_temp_high

##################################################################
## Travel speeds
## Used for all non-printing moves (homing, parking, positioning)
##################################################################
variable_travel_xy:         400     # mm/s - XY travel speed
variable_travel_z:           20     # mm/s - Z travel speed
variable_accel_travel:     9000     # mm/s² - Acceleration for travel moves

##################################################################
## Process speeds
## Used during nozzle cleaning and purging
##################################################################
variable_wipe_spd:          150     # mm/s - Speed during nozzle wipe strokes
variable_accel_wipe:       7000     # mm/s² - Acceleration during wipe
variable_purge_spd:          11     # mm/s - Filament extrusion speed during purge
variable_purge_ret:           5     # mm   - Retract length after purge to prevent ooze
variable_ooze_dwell:       2500     # ms   - Wait after cooling to let filament solidify

##################################################################
## Cleaning mode selection
## Any combination can be enabled
##################################################################
variable_clean_do_flick:    False   # Flick: knock off blob from right brush edge into bucket
variable_clean_do_wipe:      False   # Wipe: linear left-right passes (current behavior)
variable_clean_do_circular: True   # Circular: semicircle scrub across brush width

##################################################################
## Wipe settings
##################################################################
variable_wipe_qty:            5     # Number of full wipe strokes (left→right→left = 1 wipe)

##################################################################
## Flick settings
## Nozzle moves from brush_x_right (bucket) into brush and snaps back
##################################################################
variable_flick_count:         5     # Number of flick movements
variable_flick_depth:         3     # mm to dip into brush from brush_x_right
variable_flick_spd:         150     # mm/s - inward speed
variable_flick_return_mult: 1.5     # Return speed multiplier for snap effect

##################################################################
## Circular scrub settings
## Semicircles along brush width, dipping only into -Y (stays within Y bounds)
## Brush width / (circle_radius * 2) determines number of arcs per pass
##################################################################
variable_circle_radius:       3     # mm - radius of each semicircle
variable_circle_spd:         80     # mm/s - speed during arcs
variable_circle_passes:       2     # Passes (1 = left→right only, 2 = both ways)

gcode:
    {action_respond_info("Running this macro does nothing, it is only used for storing variable values.")}