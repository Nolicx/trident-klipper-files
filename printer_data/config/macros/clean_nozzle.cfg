# https://www.printables.com/model/957985-voron-24-bamboo-a1-brush-bucket

[gcode_macro CLEAN_NOZZLE]
gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set nozzle_brush_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set purge_len = params.PURGE|default(0)|int %}
    {% set clean_temp = params.CLEAN|default(0)|int %}
    {% set purge_temp = printer.extruder.temperature %}
    {% if clean_temp > 0 %}
        {% set purge_temp = clean_temp %}
    {% endif %}
    {% set old_accel = printer.toolhead.max_accel|float %}
    {% set do_return = params.RETURN|default(1)|int %}

    SAVE_GCODE_STATE NAME=clean_nozzle

    # Navigate to brush via PARK (handles homing, Z-raise, rear approach)
    PARK
    SET_VELOCITY_LIMIT ACCEL={v.accel_wipe}

    ##################################################################
    # Purge
    ##################################################################
    {% if (purge_temp > v.purge_temp_min) and (purge_len > 0) %}
        {% set clean_temp = purge_temp %}
        M107
        STATUS_HEATING_NOZZLE
        M104 S{purge_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={purge_temp}
        STATUS_CLEANING
        M83
        M106 S255
        G1 E{purge_len} F{v.purge_spd * 60}
        G1 E-{v.purge_ret} F{v.purge_spd * 60 * 5}
        G92 E0
    {% endif %}

    # Wait for nozzle to cool to clean_temp if specified
    {% if clean_temp > 0 %}
        SET_DISPLAY_TEXT MSG="Hotend: {clean_temp}c"
        M104 S{clean_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={clean_temp}
        G4 P{v.ooze_dwell}
    {% endif %}

    {% if purge_len == 0 %}
        M106 S255
    {% endif %}

    ##################################################################
    # Wipe — left-right passes, slow into brush, fast snap back toward bucket
    ##################################################################
    {% if v.clean_do_wipe %}
        {% for wipes in range(1, (v.wipe_qty + 1)) %}
            G0 Y{nozzle_brush_y - 14} F{v.travel_xy * 60}
            G0 X{v.brush_x_left}
            G0 Y{nozzle_brush_y}
            G1 X{v.brush_x_right} Y{nozzle_brush_y} F{v.wipe_spd * v.wipe_return_mult * 60}
            G1 X{v.brush_x_left} F{v.wipe_spd * 60}
            G1 X{v.brush_x_right} F{v.wipe_spd * v.wipe_return_mult * 60}
        {% endfor %}
    {% endif %}

    ##################################################################
    # Circular scrub — semicircles along brush width (G3, left→right)
    # G3 CCW with I=+r: arc dips into -Y, stays within Y bounds ✓
    # Each pass does a full left→right sweep; circle_passes = number of sweeps
    ##################################################################
    {% if v.clean_do_circular %}
        {% set arc_d = v.circle_radius * 2 %}
        {% set n_arcs = ((v.brush_x_right - v.brush_x_left) / arc_d)|int %}
        {% for pass in range(v.circle_passes) %}
            G0 Y{nozzle_brush_y - 14} F{v.travel_xy * 60}
            G0 X{v.brush_x_left}
            G0 Y{nozzle_brush_y}
            {% set ns = namespace(x=v.brush_x_left) %}
            {% for i in range(n_arcs) %}
                G3 X{ns.x + arc_d} Y{nozzle_brush_y} I{v.circle_radius} J0 F{v.circle_spd * 60}
                {% set ns.x = ns.x + arc_d %}
            {% endfor %}
        {% endfor %}
    {% endif %}

    M107
    SET_DISPLAY_TEXT MSG="Nozzle cleaned"
    {% if do_return %}
        G0 Z{v.park_z_hop} F{v.travel_z * 60}
    {% endif %}
    SET_VELOCITY_LIMIT ACCEL={old_accel}
    RESTORE_GCODE_STATE NAME=clean_nozzle
