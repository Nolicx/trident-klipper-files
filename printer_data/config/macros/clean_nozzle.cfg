# https://www.printables.com/model/957985-voron-24-bamboo-a1-brush-bucket

[gcode_macro CLEAN_NOZZLE]
variable_bucket_pos: 0              # Placeholder

gcode:
    {% set v = printer["gcode_macro _VARIABLES"] %}
    {% set nozzle_brush_y = printer.toolhead.axis_maximum.y|float %}
    {% set purge_len = params.PURGE|default(0)|int %}
    {% set clean_temp = params.CLEAN|default(0)|int %}
    {% set purge_temp = printer.extruder.temperature %}
    {% if clean_temp > 0 %}
        {% set purge_temp = clean_temp %}
    {% endif %}

    {% set old_accel = printer.toolhead.max_accel|float %}

    {% if "xyz" in printer.toolhead.homed_axes %}

        SAVE_GCODE_STATE NAME=clean_nozzle
        SET_VELOCITY_LIMIT ACCEL={v.accel_wipe}

        SET_DISPLAY_TEXT MSG="Cleaning nozzle"

        {% set y_max = printer.configfile.config["stepper_y"]["position_max"]|float %}

        # Raise Z for travel
        G91
        G1 Z0 F{v.travel_z * 60}
        G90

        # Navigate to brush position safely
        {% if printer.toolhead.position.y >= v.safe_approach_y and (printer.toolhead.position.x < (v.brush_x_left - 1) or printer.toolhead.position.x > (v.brush_x_left + 1)) %}
            G0 Y{y_max - 14} F{v.travel_xy * 60}
            G0 X{v.brush_x_left}
            G0 Y{y_max}
        {% elif printer.toolhead.position.y != nozzle_brush_y and (printer.toolhead.position.x < (v.brush_x_left - 1) or printer.toolhead.position.x > (v.brush_x_left + 1)) %}
            G0 X{v.brush_x_left} Y{y_max - 14} F{v.travel_xy * 60}
            G0 Y{y_max}
        {% endif %}

        # Purge if temp is sufficient and purge length > 0
        {% if (purge_temp > v.purge_temp_min) and (purge_len > 0) %}
            {% set clean_temp = purge_temp %}
            M107
            STATUS_HEATING_NOZZLE
            M104 S{purge_temp}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={purge_temp}
            STATUS_CLEANING
            M83
            M106 S255
            G1 E{purge_len} F{v.purge_spd * 60}
            G1 E-{v.purge_ret} F{v.purge_spd * 60 * 5}
            G92 E0
        {% endif %}

        # Wait for nozzle to cool to clean_temp if specified
        {% if clean_temp > 0 %}
            SET_DISPLAY_TEXT MSG="Hotend: {clean_temp}c"
            M104 S{clean_temp}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={clean_temp}
            G4 P{v.ooze_dwell}
        {% endif %}

        {% if purge_len == 0 %}
            M106 S255
        {% endif %}

        # Perform wipes
        {% for wipes in range(1, (v.wipe_qty + 1)) %}
            G1 X{v.brush_x_right} Y{nozzle_brush_y} F{v.wipe_spd * 60}
            G1 X{v.brush_x_left} F{v.wipe_spd * 60}
            G1 X{v.brush_x_right} F{v.wipe_spd * 60}
        {% endfor %}

        M107

        SET_DISPLAY_TEXT MSG="Nozzle cleaned"
        SET_VELOCITY_LIMIT ACCEL={old_accel}
        RESTORE_GCODE_STATE NAME=clean_nozzle

    {% else %}
        { action_raise_error("Please home your axes!") }
        SET_DISPLAY_TEXT MSG="Please home first!"
    {% endif %}