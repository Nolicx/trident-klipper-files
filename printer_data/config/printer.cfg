# stealthchop_threshold: 0

#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PB1
max_power: 1.0
min_temp: 0
max_temp: 115
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

#####################################################################
# 	Probe
#####################################################################

[probe]
pin: ^EBBCan:gpio22
x_offset: 0
y_offset: 0
#z_offset: -0.730
lift_speed: 30
activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        # Temperature target is already low enough, but nozzle may still be too hot.
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}

#####################################################################
# 	Fan Control
#####################################################################
[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
kick_start_time: 0.5
heater_temp: 40.0
max_power: 1.0

[fan_generic nevermore]
##	Print Cooling Fan - CNC_FAN0
pin: PF7
kick_start_time: 0.5
shutdown_speed: 0.0
max_power: 1.0

[fan_generic exhaust_fan]
#	Exhaust fan - CNC_FAN0
pin: PF9
kick_start_time: 0.5
shutdown_speed: 0.0
max_power: 1.0

[heater_fan controller_fan]
##	Controller fan - CNC_FAN2
pin: PA6
heater: extruder
kick_start_time: 0.5
heater_temp: 80
fan_speed: 1.0

[heater_fan stepper_driver_fan]
pin: PA4
heater: extruder
kick_start_time: 0.5
heater_temp: 80
fan_speed: 1.0

## Part cooling fans

[fan_generic part_cooling] # fan 0 OrcaSlicer
##	Part Cooling Fan - CNC_FAN0
pin: EBBCan:gpio13
kick_start_time: 0.5
##	Depending on your fan, you may need to increase this value
##	if your fan will not start. Can change cycle_time (increase)
##	if your fan is not able to slow down effectively
off_below: 0.05
max_power: 1.0

[fan_generic auxiliary] # fan 2 OrcaSlicer
pin: PA2
kick_start_time: 0.5
max_power: 1.0
shutdown_speed: 0.0

[gcode_macro M106]
description: "Set fan speed (Orca compatible)"
gcode:
    {% set fan_map = {
        0: "part_cooling",      # Orca P0 → CPAP blower
        # 3: "EXHAUST",   # Orca P3 → Exhaust
        2: "auxiliary",     # Uncomment if you define AUX
    } %}
    {% set p = params.P|int if 'P' in params else 0 %}
    {% set fan = fan_map[p] if p in fan_map else fan_map[0] %}
    {% set speed = (params.S|float / 255 if 'S' in params else 1.0) %}
    SET_FAN_SPEED FAN={fan} SPEED={speed}

[gcode_macro M107]
description: "Turn off fans. No P = all, P# = specific"
gcode:
    {% set fan_map = {
        0: "part_cooling",      # Orca P0 → CPAP blower
        # 3: "EXHAUST",   # Orca P3 → Exhaust
        2: "auxiliary",     # Uncomment if you define AUX
    } %}
    {% if 'P' in params %}
        {% set p = params.P|int %}
        {% if p in fan_map %}
            SET_FAN_SPEED FAN={fan_map[p]} SPEED=0
        # {% else %}
        #     RESPOND PREFIX="warn" MSG="Unknown fan index P{{p}}"
        {% endif %}
    {% else %}
        # No P -> turn off all mapped fans
        {% for f in fan_map.values() %}
            SET_FAN_SPEED FAN={f} SPEED=0
        {% endfor %}
    {% endif %}

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 3300

[safe_z_home]
##--------------------------------------------------------------------
home_xy_position: 148,150
##--------------------------------------------------------------------
speed: 100
z_hop: 10

[z_tilt]

##--------------------------------------------------------------------
## Uncomment below for 300mm build
z_positions:
  -50, 18
  150, 348
  350, 18
points:
  30, 5
  150, 245
  270, 5
##--------------------------------------------------------------------

speed: 300
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075


# [bed_mesh]
# mesh_min: 10,10
# ##--------------------------------------------------------------------
# ##	Uncomment below for 300mm build
# mesh_max: 290,290
# ##--------------------------------------------------------------------
[bed_mesh]
speed: 300
horizontal_move_z: 5
##--------------------------------------------------------------------
#	Uncomment for 300mm build
mesh_min: 40, 40
mesh_max: 260,260
zero_reference_position: 148,150 #for use with stock z endstop
##--------------------------------------------------------------------
fade_start: 0.6
fade_end: 10.0
probe_count: 5,5 # Values should be odd, so one point is directly at bed center
algorithm: bicubic

[adxl345]
cs_pin: EBBCan:gpio1
spi_software_sclk_pin: EBBCan:gpio2
spi_software_mosi_pin: EBBCan:gpio0
spi_software_miso_pin: EBBCan:gpio3
axes_map: z,-y,x

[resonance_tester]
probe_points: 148, 150, 50			# Set to the middle of your bed
accel_chip: adxl345
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0

[input_shaper]
shaper_type_x: mzv # filter type for the X axis
shaper_freq_x: 51.6 # center frequency for the X axis filter
damping_ratio_x: 0.079 # damping ratio for the X axis

shaper_type_y: 2hump_ei # filter type for the Y axis
shaper_freq_y: 64.0 # center frequency for the Y axis filter
damping_ratio_y: 0.078 # damping ratio for the Y axis

########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

